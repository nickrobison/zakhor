name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  TRACKER_ENDPOINT: http://localhost:9999

jobs:
  # ── Backend ──────────────────────────────────────────────────────
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v16
      - uses: DeterminateSystems/magic-nix-cache-action@v8
      - run: nix build .#checks.x86_64-linux.rust-fmt .#checks.x86_64-linux.rust-clippy

  backend-test:
    runs-on: ubuntu-latest
    env:
      FASTEMBED_CACHE_DIR: ${{ github.workspace }}/.fastembed_cache
      FASTEMBED_MODEL_CACHE_KEY: bge-small-en-v1.5
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v16
      - uses: DeterminateSystems/magic-nix-cache-action@v8
      - uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.fastembed_cache
          key: ${{ runner.os }}-fastembed-${{ env.FASTEMBED_MODEL_CACHE_KEY }}
          restore-keys: |
            ${{ runner.os }}-fastembed-
      - run: nix build .#checks.x86_64-linux.rust-test

  # ── Frontend ─────────────────────────────────────────────────────
  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v16
      - uses: DeterminateSystems/magic-nix-cache-action@v8
      - run: nix build .#checks.x86_64-linux.frontend-lint

  frontend-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v16
      - uses: DeterminateSystems/magic-nix-cache-action@v8
      - run: nix build .#checks.x86_64-linux.frontend-typecheck

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v16
      - uses: DeterminateSystems/magic-nix-cache-action@v8
      - run: nix build .#checks.x86_64-linux.frontend-test

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v16
      - uses: DeterminateSystems/magic-nix-cache-action@v8
      - run: nix build .#checks.x86_64-linux.frontend-build

  # ── Python integration tests ─────────────────────────────────────
  python-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v16
      - uses: DeterminateSystems/magic-nix-cache-action@v8
      - run: nix build .#checks.x86_64-linux.python-test

  # ── End-to-end ───────────────────────────────────────────────────
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v16
      - uses: DeterminateSystems/magic-nix-cache-action@v8
      - run: nix build .#checks.x86_64-linux.e2e
