name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  TRACKER_ENDPOINT: http://localhost:9999

jobs:
  # ── Backend ──────────────────────────────────────────────────────
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libglib2.0-dev libtracker-sparql-3.0-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings

  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libglib2.0-dev libtracker-sparql-3.0-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/cache@v4
        with:
          path: .fastembed_cache
          key: ${{ runner.os }}-fastembed-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-fastembed-
      - run: cargo test

  # ── Frontend ─────────────────────────────────────────────────────
  frontend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ui
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ./ui/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint

  frontend-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ui
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ./ui/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck

  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ui
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ./ui/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ui
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ./ui/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

  # ── Python integration tests ─────────────────────────────────────
  python-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libglib2.0-dev libtracker-sparql-3.0-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build Rust binary
        run: cargo build

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install Python dependencies
        working-directory: ./tests/python
        run: uv sync --frozen

      - name: Run Python tests
        working-directory: ./tests/python
        run: uv run pytest -v

  # ── End-to-end ───────────────────────────────────────────────────
  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ui
    steps:
      - uses: actions/checkout@v4

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libglib2.0-dev libtracker-sparql-3.0-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ./ui/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm run build

      - name: Build Rust server
        run: cargo build
        working-directory: .

      - name: Start Rust server (validate startup)
        run: |
          nohup target/debug/zakhor --http > /tmp/zakhor.log 2>&1 &
          sleep 2
          echo "--- Rust server log (may fail without Tracker) ---"
          cat /tmp/zakhor.log || true
        working-directory: .

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium

      - name: Run Playwright tests
        run: pnpm run e2e

      - name: Cleanup background server
        if: always()
        run: |
          pkill -f "target/debug/zakhor" 2>/dev/null || true
