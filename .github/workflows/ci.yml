name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  TRACKER_ENDPOINT: http://localhost:9999

jobs:
  # ── Backend ──────────────────────────────────────────────────────
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v16
      - uses: DeterminateSystems/magic-nix-cache-action@v8
      - run: nix build .#checks.x86_64-linux.rust-fmt .#checks.x86_64-linux.rust-clippy

  backend-test:
    runs-on: ubuntu-latest
    env:
      FASTEMBED_CACHE_DIR: ${{ github.workspace }}/.fastembed_cache
      FASTEMBED_MODEL_CACHE_KEY: bge-small-en-v1.5
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v16
      - uses: DeterminateSystems/magic-nix-cache-action@v8
      - uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.fastembed_cache
          key: ${{ runner.os }}-fastembed-${{ env.FASTEMBED_MODEL_CACHE_KEY }}
          restore-keys: |
            ${{ runner.os }}-fastembed-
      - run: nix build .#checks.x86_64-linux.rust-test

  # ── Frontend ─────────────────────────────────────────────────────
  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v16
      - uses: DeterminateSystems/magic-nix-cache-action@v8
      - run: nix build .#checks.x86_64-linux.frontend-lint

  frontend-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v16
      - uses: DeterminateSystems/magic-nix-cache-action@v8
      - run: nix build .#checks.x86_64-linux.frontend-typecheck

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v16
      - uses: DeterminateSystems/magic-nix-cache-action@v8
      - run: nix build .#checks.x86_64-linux.frontend-test

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v16
      - uses: DeterminateSystems/magic-nix-cache-action@v8
      - run: nix build .#checks.x86_64-linux.frontend-build

  # ── Python integration tests ─────────────────────────────────────
  python-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v16
      - uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Install tinysparql runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-dev libtracker-sparql-3.0-dev tinysparql

      - name: Start tinysparql endpoint
        run: |
          tinysparql endpoint --port=7200 &
          sleep 3
          echo "tinysparql ready on port 7200"

      - name: Build zakhor binary (Nix)
        run: nix build .#zakhor

      - name: Link binary to conftest.py expected path
        run: |
          mkdir -p target/debug
          ln -sf "$(pwd)/result/bin/zakhor" target/debug/zakhor

      - name: Build Python test environment (Nix)
        run: nix build .#zakhor-python-tests

      - name: Run Python integration tests
        env:
          ZAKHOR_SPARQL_ENDPOINT: http://localhost:7200
        run: |
          cd tests/python
          ../../result/bin/pytest -v

      - name: Cleanup tinysparql
        if: always()
        run: pkill -f tinysparql 2>/dev/null || true

  # ── End-to-end ───────────────────────────────────────────────────
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v16
      - uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Build frontend (Nix)
        run: nix build .#zakhor-frontend

      - name: Copy built frontend to ui/dist/ for preview server
        run: |
          rm -rf ui/dist
          cp -r result/ ui/dist/

      - name: Install frontend deps (node_modules for playwright CLI)
        run: nix shell nixpkgs#nodejs_22 nixpkgs#pnpm_11 -c pnpm install --frozen-lockfile
        working-directory: ./ui

      - name: Install Playwright browsers
        run: |
          nix shell nixpkgs#nodejs_22 nixpkgs#pnpm_11 -c pnpm exec playwright install chromium
        working-directory: ./ui

      - name: Start Xvfb for headless display
        run: |
          sudo apt-get install -y xvfb
          Xvfb :99 -screen 0 1280x1024x24 &
          echo "DISPLAY=:99" >> "$GITHUB_ENV"

      - name: Run Playwright e2e tests
        run: nix shell nixpkgs#nodejs_22 nixpkgs#pnpm_11 -c pnpm run e2e
        working-directory: ./ui

      - name: Cleanup Xvfb
        if: always()
        run: pkill -f Xvfb 2>/dev/null || true
