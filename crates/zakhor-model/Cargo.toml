[package]
name = "zakhor-model"
version = "0.1.0"
edition = "2024"

[lib]

[dependencies]
zakhor-common = { path = "../zakhor-common" }
zakhor-storage = { path = "../zakhor-storage" }
zakhor-search = { path = "../zakhor-search" }

gio = "0.22.6"
